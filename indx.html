    padding:35px 40px;border-radius:20px;

  #phonetic{font-size:18px;color:#ff9900;margin-bottom:8px;}
  #chinese{font-size:22px;color:#ffd700;margin-bottom:10px;}
  #pos{font-size:18px;color:#00ffff;margin-bottom:8px;}

  #spell{font-size:18px;color:#66ccff;letter-spacing:2px;margin-bottom:6px;}

  #followInput{
    font-size:18px;padding:8px 15px;width:320px;text-align:center;
    background:#1a2235;color:#ff699;
    border:2px solid #ff699;border-radius:10px;outline:none;
    letter-spacing:2px;transition:border-color 0.3s ease;
  }
  #followInput.error{border-color:#ff4444;color:#ff4444;}
  #followInput.correct{border-color:#00ff99;color:#00ff99;}

  #letterTip{font-size:16px;letter-spacing:2px;margin-top:8px;min-height:20px;}
  #letterTip span{padding:0 2px;}
  #letterTip .correct-letter{color:#00ff99;}
  #letterTip .wrong-letter{color:#ff4444;text-decoration:underline;}
  #letterTip .empty-letter{color:#666;}

  #errorTip{font-size:14px;color:#ff4444;margin-top:6px;height:18px;line-height:18px;}
  #tip{margin-top:15px;font-size:14px;color:#aaa;}

  #controlBtns{
    position:fixed;top:20px;left:20px;z-index:20;
    display:flex;gap:10px;
  }
  .ctrlBtn{
    width:45px;height:45px;border-radius:50%;
    background:rgba(15,20,40,0.9);color:#fff;
    border:none;cursor:pointer;font-size:18px;
    display:flex;align-items:center;justify-content:center;
  }
  .ctrlBtn:hover{background:rgba(30,40,80,0.9);}

  #categoryBtns{
    position:fixed;top:20px;right:20px;z-index:20;
    display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;
    max-width:50%;
  }
  .categoryBtn{
    padding:6px 12px;border-radius:20px;
    background:rgba(15,20,40,0.9);color:#fff;border:none;
    cursor:pointer;font-size:14px;white-space:nowrap;
    transition:all 0.2s ease;
  }
  .categoryBtn:hover{
    background:rgba(0,255,200,0.8);color:#080a1a;
    transform:scale(1.05);
  }
  .categoryBtn.active{
    background:#00ffcc;color:#080a1a;font-weight:bold;
  }

  canvas{display:block;}
</style>
</head>

  { unit:"高频形容词", en:"good", phonetic:"/ɡʊd/", pos:"adj. 好的", zh:"好的", phrase:"be good at 擅长" },

  { unit:"高频形容词", en:"cool", phonetic:"/kuːl/", pos:"adj. 凉爽的；酷的", zh:"凉爽的；酷的", phrase:"cool clothes 酷的衣服" }
];

const cateStartIndex = {};
words.forEach((item, i) => {
  if(!cateStartIndex[item.unit]) cateStartIndex[item.unit] = i;
});
cateStartIndex.all = 0;

let switchTime = 16;
let timer = null;
let spellTimer = null;
let index = 0;
let isPlaying = true;
let currentCate = "all";

const followInput = document.getElementById('followInput');
const errorTip = document.getElementById('errorTip');
const letterTip = document.getElementById('letterTip');
let currentWord = "";

function speakText(text, isLetter=false) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = isLetter ? 0.8 : 1;
  window.speechSynthesis.speak(u);
}

function checkSpelling() {
  const inputValue = followInput.value.trim().toLowerCase();
  const targetWord = currentWord.toLowerCase();
  followInput.classList.remove('error', 'correct');
  errorTip.textContent = "";
  letterTip.innerHTML = "";
  if (!inputValue) return;

  if (inputValue === targetWord) {
    followInput.classList.add('correct');
    errorTip.textContent = "✅ 拼写正确！";
    errorTip.style.color = "#00ff99";
    renderLetterTip(targetWord, targetWord, true);
  } else {
    followInput.classList.add('error');
    errorTip.textContent = inputValue.length !== targetWord.length
      ? `❌ 长度应为 ${targetWord.length} 个字母`
      : "❌ 字母有误";
    errorTip.style.color = "#ff4444";
    renderLetterTip(targetWord, inputValue, false);
  }
}

function renderLetterTip(target, input, isAllCorrect) {
  let html = "";
  const maxLen = Math.max(target.length, input.length);
  for(let i=0;i<maxLen;i++){
    const t = target[i]||"";
    const inp = input[i]||"";
    if(isAllCorrect){
      html+=`<span class="correct-letter">${t.toUpperCase()}</span>`;
    }else{
      if(i>=target.length) html+=`<span class="wrong-letter">${inp.toUpperCase()}</span>`;
      else if(i>=input.length) html+=`<span class="empty-letter">_</span>`;
      else if(t===inp) html+=`<span class="correct-letter">${t.toUpperCase()}</span>`;
      else html+=`<span class="wrong-letter">${t.toUpperCase()}</span>`;
    }
  }
  letterTip.innerHTML = html;
}

function showSpell(word) {
  if(spellTimer) clearInterval(spellTimer);
  const spellDom = document.getElementById('spell');
  spellDom.innerText = "拼写：";
  let i=0;
  spellTimer = setInterval(()=>{
    if(i<word.length){
      spellDom.innerText += word[i];
      speakText(word[i],true);
      i++;
    }else{
      clearInterval(spellTimer);
      setTimeout(()=>speakText(word),500);
    }
  },800);
}

function showWord(){
  if(spellTimer) clearInterval(spellTimer);
  const w=words[index%words.length];
  document.getElementById("unit").innerText = w.unit;
  document.getElementById("english").innerText = w.en;
  document.getElementById("phonetic").innerText = "音标：" + w.phonetic;
  document.getElementById("chinese").innerText = w.zh;
  document.getElementById("pos").innerText = "词性：" + w.pos;
  document.getElementById("phrase").innerText = "高频词组：" + w.phrase;
  document.getElementById("spell").innerText = "拼写：";

  currentWord = w.en;
  followInput.value = "";
  followInput.classList.remove('error','correct');
  errorTip.textContent = "";
  letterTip.innerHTML = "";
  followInput.focus();

  speakText(w.en);
  setTimeout(()=>showSpell(w.en),1000);
}

function startWordSwitch(){
  if(timer) clearInterval(timer);
  if(isPlaying){
    timer = setInterval(()=>{
      index = (index + 1) % words.length;
      showWord();
    }, switchTime*1000);
  }
}

// 修复：上一个 / 下一个 正常使用
function prevWord(){
  index = (index - 1 + words.length) % words.length;
  showWord();
}
function nextWord(){
  index = (index + 1) % words.length;
  showWord();
}

function togglePlayPause(){
  isPlaying=!isPlaying;
  document.getElementById('playPauseBtn').innerText = isPlaying ? "⏯️" : "▶️";
  startWordSwitch();
}

function jumpToCategory(cate){
  currentCate = cate;
  index = cateStartIndex[cate];

  document.querySelectorAll('.categoryBtn').forEach(btn=>{
    btn.classList.remove('active');
    if(btn.dataset.cate === cate) btn.classList.add('active');
  });

  if(cate !== "all"){
    isPlaying = false;
    document.getElementById('playPauseBtn').innerText = "▶️";
    if(timer) clearInterval(timer);
  }else{
    isPlaying = true;
    document.getElementById('playPauseBtn').innerText = "⏯️";
    startWordSwitch();
  }
  showWord();
}

// 星空背景
const c = document.getElementById('c');
const ctx = c.getContext('2d');
function resize(){c.width=innerWidth;c.height=innerHeight;}
resize();
window.addEventListener('resize',resize);

let stars=[];
for(let i=0;i<800;i++){
  stars.push({x:(Math.random()-0.5)*innerWidth*3,y:(Math.random()-0.5)*innerHeight*3,z:Math.random()*1500+100,size:Math.random()*1.5+0.5});
}
let tx=0,ty=0;
window.addEventListener('mousemove',e=>{tx=(e.x-innerWidth/2)/25;ty=(e.y-innerHeight/2)/25;});

function draw(){
  ctx.fillStyle='#080a1a';
  ctx.fillRect(0,0,c.width,c.height);
  stars.forEach(s=>{
    s.z-=2.5;if(s.z<50)s.z=1500;
    const k=200/s.z;
    const x=c.width/2+(s.x+tx)*k;
    const y=c.height/2+(s.y+ty)*k;
    if(x<0||x>c.width||y<0||y>c.height)return;
    ctx.fillStyle=`rgba(255,255,255,${Math.min(1,(1500-s.z)/1000)})`;
    ctx.beginPath();ctx.arc(x,y,s.size*k,0,Math.PI*2);ctx.fill();
  });
  requestAnimationFrame(draw);
}

document.getElementById('prevBtn').onclick = prevWord;
document.getElementById('nextBtn').onclick = nextWord;
document.getElementById('playPauseBtn').onclick = togglePlayPause;

document.querySelectorAll('.categoryBtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    jumpToCategory(btn.dataset.cate);
  });
});

followInput.addEventListener('input', checkSpelling);
followInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    checkSpelling();
    setTimeout(nextWord,800);
  }
});

showWord();
startWordSwitch();
draw();
document.querySelector('.categoryBtn[data-cate="all"]').classList.add('active');
</script>
